<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Punch Clicker: Ultra Edition</title>
    <style>
        body { 
            margin: 0; background: #0a0a0a; color: #fff; 
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }
        #game-container {
            width: 900px; height: 600px; background: linear-gradient(0deg, #111 0%, #222 100%);
            position: relative; border: 4px solid #00ffcc; margin-top: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3); display: flex;
        }
        /* Painel Lateral */
        #shop {
            width: 280px; background: #000; border-right: 2px solid #00ffcc;
            padding: 15px; display: flex; flex-direction: column; gap: 12px;
        }
        .upgrade-btn {
            background: #111; border: 1px solid #00ffcc; color: #00ffcc;
            padding: 12px; cursor: pointer; text-align: left; transition: 0.2s;
        }
        .upgrade-btn:hover:not(:disabled) { background: #00ffcc; color: #000; }
        .upgrade-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Área de Luta */
        #ring { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #enemy {
            font-size: 160px; cursor: pointer; transition: transform 0.05s;
            filter: drop-shadow(0 0 20px #ff0055); user-select: none; z-index: 2;
        }
        #enemy:active { transform: scale(0.8) rotate(5deg); }

        /* Barras e HUD */
        .hud-stats { position: absolute; top: 15px; right: 20px; text-align: right; }
        
        .bar-container { width: 350px; margin-top: 10px; text-align: center; }
        .bar-bg { width: 100%; height: 20px; background: #222; border: 1px solid #fff; position: relative; }
        #hp-fill { width: 100%; height: 100%; background: #ff0055; transition: width 0.1s; }
        
        /* Barra de Especial */
        #special-bg { height: 10px; border-color: #00ffcc; margin-top: 5px; }
        #special-fill { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 15px #00ffcc; }
        
        #btn-special {
            margin-top: 15px; padding: 10px 20px; background: #000; border: 2px solid #00ffcc;
            color: #00ffcc; font-weight: bold; cursor: pointer; display: none;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px #00ffcc; }
            50% { transform: scale(1.05); box-shadow: 0 0 20px #00ffcc; }
            100% { transform: scale(1); box-shadow: 0 0 0px #00ffcc; }
        }

        .damage-popup {
            position: absolute; color: #fff; font-weight: bold; pointer-events: none;
            animation: float 0.5s ease-out forwards; font-size: 28px; z-index: 10;
        }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

    <h1 style="color: #00ffcc; text-shadow: 0 0 10px #00ffcc;">PUNCH <span style="color:#ff0055">CLICKER</span></h1>

    <div id="game-container">
        <div id="shop">
            <h3 style="color: #00ffcc; border-bottom: 1px solid #00ffcc;">UPGRADES</h3>
            <button class="upgrade-btn" id="up-punch" onclick="buy('punch')">🥊 Soco (+1)<br>Custo: $<span id="c-punch">10</span></button>
            <button class="upgrade-btn" id="up-gym" onclick="buy('gym')">🏋️ Academia (+10)<br>Custo: $<span id="c-gym">100</span></button>
            <button class="upgrade-btn" id="up-coach" onclick="buy('coach')">📢 Treinador (DPS)<br>Custo: $<span id="c-coach">500</span></button>
            
            <div style="margin-top: auto; font-size: 13px; color: #00ffcc;">
                DANO CLIQUE: <span id="stat-click">1</span><br>
                DANO AUTOMÁTICO: <span id="stat-auto">0</span>/s
            </div>
        </div>

        <div id="ring">
            <div class="hud-stats">
                <span style="color:#00ffcc; font-size: 24px;">$</span><span id="money" style="font-size: 24px;">0</span><br>
                NOCAUTES: <span id="kills">0</span>
            </div>

            <div id="enemy" onclick="punch(event)">🤖</div>

            <div class="bar-container">
                <div style="font-size: 12px;">ESTRUTURA DO OPONENTE</div>
                <div class="bar-bg"><div id="hp-fill"></div></div>
                
                <div style="font-size: 12px; margin-top: 15px; color: #00ffcc;">BARRA DE ESPECIAL</div>
                <div class="bar-bg" id="special-bg"><div id="special-fill"></div></div>
                
                <button id="btn-special" onclick="useSpecial()">🔥 SUPER SOCO (X10) 🔥</button>
            </div>
        </div>
    </div>

    <script>
        let money = 0;
        let kills = 0;
        let clickDmg = 1;
        let autoDmg = 0;
        let specialCharge = 0;
        
        let hp = 100, maxHp = 100;
        const enemies = ["🤖", "🦾", "👾", "🦿", "👺", "🧟"];

        function punch(e) {
            dealDamage(clickDmg);
            chargeSpecial(2); // Carrega 2% por soco
            spawnText(e.clientX, e.clientY, clickDmg, "#ff0055");
            
            // Tremidinha no inimigo
            document.getElementById('enemy').style.transform = `translateX(${Math.random()*10-5}px)`;
        }

        function dealDamage(amt) {
            hp -= amt;
            money += Math.ceil(amt * 0.8);
            if (hp <= 0) {
                kills++;
                money += maxHp;
                maxHp = Math.floor(maxHp * 1.3);
                hp = maxHp;
                document.getElementById('enemy').innerText = enemies[Math.floor(Math.random()*enemies.length)];
            }
            updateUI();
        }

        function chargeSpecial(amt) {
            specialCharge = Math.min(100, specialCharge + amt);
            document.getElementById('special-fill').style.width = specialCharge + "%";
            if (specialCharge >= 100) {
                document.getElementById('btn-special').style.display = 'block';
            }
        }

        function useSpecial() {
            let socoGigante = clickDmg * 15;
            dealDamage(socoGigante);
            specialCharge = 0;
            document.getElementById('special-fill').style.width = "0%";
            document.getElementById('btn-special').style.display = 'none';
            
            // Efeito visual
            spawnText(window.innerWidth/2, window.innerHeight/2, "K.O.!", "#00ffcc");
            document.getElementById('ring').style.backgroundColor = "#fff";
            setTimeout(() => document.getElementById('ring').style.backgroundColor = "transparent", 100);
        }

        function spawnText(x, y, val, color) {
            const t = document.createElement('div');
            t.className = 'damage-popup';
            t.innerText = val;
            t.style.left = x + "px";
            t.style.top = y + "px";
            t.style.color = color;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 500);
        }

        let upgrades = {
            punch: { c: 10, l: 1 },
            gym: { c: 100, l: 0 },
            coach: { c: 500, l: 0 }
        };

        function buy(id) {
            let u = upgrades[id];
            if (money >= u.c) {
                money -= u.c;
                u.l++;
                if(id==='punch') clickDmg += 1;
                if(id==='gym') clickDmg += 12;
                if(id==='coach') autoDmg += 5;
                u.c = Math.floor(u.c * 1.6);
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(money);
            document.getElementById('hp-fill').style.width = (hp/maxHp)*100 + "%";
            document.getElementById('kills').innerText = kills;
            document.getElementById('stat-click').innerText = clickDmg;
            document.getElementById('stat-auto').innerText = autoDmg;
            
            for(let id in upgrades) {
                document.getElementById('c-'+id).innerText = upgrades[id].c;
                document.getElementById('up-'+id).disabled = money < upgrades[id].c;
            }
        }

        setInterval(() => { if(autoDmg > 0) dealDamage(autoDmg/10); }, 100);
        updateUI();
    </script>
</body>
</html>
